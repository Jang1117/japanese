<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハイキュー로 배우는 일본어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --orange:#E8601C;--orange-light:#fff0e8;--orange-dark:#b84810;
  --green:#3aaf6a;--red:#e24b4a;--blue:#185fa5;
  --radius:10px;--radius-lg:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}

/* ── SHELL ── */
.shell{max-width:680px;margin:0 auto;padding:0 0 80px}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;padding:12px 16px}
.topbar-inner{display:flex;align-items:center;gap:10px}
.logo{font-size:17px;font-weight:600;color:var(--text)}
.logo span{color:var(--orange)}
.topbar-tabs{display:flex;gap:4px;margin-left:auto}
.ttab{padding:6px 13px;border-radius:20px;border:none;font-size:13px;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;font-weight:500}
.ttab.active{background:var(--orange);color:#fff}
.ttab:hover:not(.active){background:var(--bg2)}

.view{display:none;padding:16px}
.view.active{display:block}

/* ── COMMON COMPONENTS ── */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px}
.section-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:6px 13px;font-size:13px;cursor:pointer;color:var(--text2)}
.back-btn:hover{color:var(--text)}
.section-title{font-size:16px;font-weight:600;color:var(--text)}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .3s}
.progress-label{font-size:12px;color:var(--text3);text-align:right;margin-bottom:12px}
.cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-btn{padding:5px 12px;border-radius:16px;border:0.5px solid var(--border2);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;font-weight:500}
.cat-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.btn{padding:11px 10px;border:0.5px solid var(--border2);background:var(--bg);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;color:var(--text);transition:all .15s;width:100%}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn.primary:hover{opacity:.88}
.tag{display:inline-block;background:var(--bg2);border-radius:12px;padding:3px 9px;font-size:11px;color:var(--text2);margin:2px;border:0.5px solid var(--border)}

/* ── HOME ── */
.hero{background:linear-gradient(135deg,#E8601C 0%,#b84810 100%);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:14px}
.hero-ball{font-size:48px;flex-shrink:0}
.hero h2{font-size:17px;font-weight:700;margin-bottom:5px}
.hero p{font-size:13px;opacity:.88;line-height:1.6}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.home-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 14px;cursor:pointer;transition:all .18s;text-align:center}
.home-card:hover{border-color:var(--orange);transform:translateY(-2px)}
.home-card .hc-icon{font-size:26px;margin-bottom:8px}
.home-card .hc-label{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.home-card .hc-desc{font-size:12px;color:var(--text3);line-height:1.4}

/* ── VOCAB ── */
.fc-top{background:var(--bg2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:28px 20px;text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.fc-speaker{font-size:12px;color:var(--orange);font-weight:600;margin-bottom:8px;letter-spacing:.04em}
.fc-char{font-size:60px;line-height:1;color:var(--text);margin-bottom:10px}
.fc-reveal{font-size:13px;color:var(--text2);cursor:pointer;border:0.5px solid var(--border2);border-radius:20px;padding:4px 14px;background:var(--bg);transition:all .15s}
.fc-reveal:hover{background:var(--bg3)}
.fc-bottom{padding:14px 18px;display:none;border-top:0.5px solid var(--border)}
.fc-bottom.show{display:block}
.fc-jp{font-size:20px;font-weight:600;color:var(--text);margin-bottom:5px}
.fc-romaji{font-size:13px;color:var(--text3);margin-bottom:3px}
.fc-kr{font-size:14px;color:var(--orange);font-weight:600;margin-bottom:10px}
.fc-ctx{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:8px 10px;line-height:1.6}

/* ── QUIZ ── */
.score-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.score-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center}
.score-n{font-size:24px;font-weight:700}
.score-n.c{color:var(--green)}
.score-n.w{color:var(--red)}
.score-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.quiz-q-box{background:var(--bg2);border-radius:var(--radius-lg);padding:28px 20px;text-align:center;margin-bottom:12px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.quiz-char{font-size:52px;color:var(--text);margin-bottom:6px}
.quiz-sub{font-size:13px;color:var(--text3)}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.qopt{border:0.5px solid var(--border2);background:var(--bg);border-radius:var(--radius);padding:12px 8px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;text-align:center;font-weight:500}
.qopt:hover:not(.disabled){border-color:var(--orange);background:var(--orange-light)}
.qopt.correct{background:#eaf3de;border-color:var(--green);color:#27500a}
.qopt.wrong{background:#fcebeb;border-color:var(--red);color:#501313}
.qopt.disabled{cursor:default;pointer-events:none}
.quiz-fb{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:10px;display:none}
.quiz-fb.show{display:block}
.fb-char{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px}
.fb-detail{font-size:12px;color:var(--text2);line-height:1.5}
.streak{font-size:12px;color:var(--orange);font-weight:600;text-align:center;min-height:18px;margin-bottom:6px}

/* ── SENTENCES ── */
.sent-scene{font-size:11px;color:var(--orange);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.sent-ep{font-size:11px;color:var(--text3);margin-bottom:10px}
.sent-jp{font-size:24px;color:var(--text);line-height:1.4;margin-bottom:7px}
.sent-romaji{font-size:12px;color:var(--text3);margin-bottom:3px}
.sent-pron{font-size:12px;color:var(--text3);margin-bottom:6px}
.sent-kr{font-size:15px;color:var(--orange);font-weight:600;margin-bottom:10px}
.breakdown-box{background:var(--bg2);border-radius:var(--radius);padding:10px;margin-top:10px;display:none}
.breakdown-box.show{display:block}
.bd-row{display:flex;gap:8px;font-size:12px;margin-bottom:6px;align-items:flex-start}
.bd-jp{font-weight:600;min-width:70px;color:var(--text)}
.bd-desc{color:var(--text2);line-height:1.4}
.toggle-bd{font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;padding:0;margin-top:6px;text-decoration:underline;text-decoration-style:dotted}

/* ── CANVAS ── */
.canvas-type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ctype-btn{padding:10px;border:0.5px solid var(--border2);background:var(--bg);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;color:var(--text);transition:all .15s;text-align:center}
.ctype-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.char-display{text-align:center;padding:10px 0}
.char-big{font-size:72px;color:var(--orange);font-weight:700;line-height:1}
.char-info{font-size:15px;color:var(--text2);margin-top:4px}
.char-strokes{font-size:12px;color:var(--text3);margin-top:2px}
.canvas-wrap{position:relative;background:#fafaf8;border:1.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px}
#drawCanvas{display:block;width:100%;height:220px;cursor:crosshair;touch-action:none}
#guideCanvas{position:absolute;top:0;left:0;pointer-events:none;opacity:0;transition:opacity .3s}
#guideCanvas.show{opacity:.28}
.canvas-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.canvas-cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.cc-btn{padding:8px 4px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);font-size:15px;cursor:pointer;text-align:center;transition:all .15s;font-weight:500;position:relative}
.cc-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.cc-btn .done-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--green);border-radius:50%;display:none}
.cc-btn.has-done .done-dot{display:block}
.tab-row{display:flex;gap:6px;margin-bottom:10px}
.tab-btn{padding:6px 14px;border-radius:16px;border:0.5px solid var(--border2);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);font-weight:500;transition:all .15s}
.tab-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.check-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green);font-weight:600;padding:4px 10px;background:#eaf3de;border-radius:20px;border:0.5px solid var(--green);cursor:pointer;transition:all .15s}
.check-badge.unchecked{color:var(--text3);background:var(--bg2);border-color:var(--border)}
.char-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}

/* katakana color */
.kana-kata .char-big{color:var(--blue)}
.kana-kata .cc-btn.active{background:var(--blue);border-color:var(--blue)}
.kana-kata .cat-btn.active{background:var(--blue);border-color:var(--blue)}
.kana-kata .progress-fill{background:var(--blue)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">🏐 <span>ハイキュー</span> 일본어</div>
      <div class="topbar-tabs">
        <button class="ttab active" onclick="showView('home')">홈</button>
        <button class="ttab" onclick="showView('vocab')">단어</button>
        <button class="ttab" onclick="showView('quiz')">퀴즈</button>
        <button class="ttab" onclick="showView('sentences')">문장</button>
        <button class="ttab" onclick="showView('canvas')">쓰기</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ HOME ═══════════════ -->
  <div id="view-home" class="view active">
    <div class="hero">
      <div class="hero-ball">🏐</div>
      <div>
        <h2>하이큐로 배우는 진짜 일본어</h2>
        <p>카게야마·힌아타·츠키시마의 명대사와<br>배구 용어로 실전 일본어를 익혀보세요.</p>
      </div>
    </div>
    <div class="home-grid">
      <div class="home-card" onclick="gotoView('vocab')">
        <div class="hc-icon">📖</div>
        <div class="hc-label">단어 카드</div>
        <div class="hc-desc">캐릭터별 대사 & 배구 용어 플래시카드</div>
      </div>
      <div class="home-card" onclick="gotoView('quiz')">
        <div class="hc-icon">⚡</div>
        <div class="hc-label">스파이크 퀴즈</div>
        <div class="hc-desc">4지선다로 단어 뜻 맞추기</div>
      </div>
      <div class="home-card" onclick="gotoView('sentences')">
        <div class="hc-icon">💬</div>
        <div class="hc-label">명대사 문장</div>
        <div class="hc-desc">에피소드별 대사 문법 분석</div>
      </div>
      <div class="home-card" onclick="gotoView('canvas')">
        <div class="hc-icon">✍️</div>
        <div class="hc-label">히라가나/가타카나 쓰기</div>
        <div class="hc-desc">손으로 직접 쓰며 익히기</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ VOCAB ═══════════════ -->
  <div id="view-vocab" class="view">
    <div class="section-hd">
      <button class="back-btn" onclick="showView('home')">← 홈</button>
      <span class="section-title">단어 카드</span>
    </div>
    <!-- character filter -->
    <div class="cat-row" id="char-filter"></div>
    <!-- category tabs -->
    <div class="cat-row" id="vocab-cats"></div>
    <div class="progress-bar"><div class="progress-fill" id="vp-fill"></div></div>
    <div class="progress-label" id="vp-label"></div>
    <!-- flashcard -->
    <div class="card" style="padding:0;overflow:hidden">
      <div class="fc-top">
        <div class="fc-speaker" id="fc-speaker"></div>
        <div class="fc-char" id="fc-char"></div>
        <button class="fc-reveal" onclick="toggleReveal()">뜻 보기 ↓</button>
      </div>
      <div class="fc-bottom" id="fc-bottom">
        <div class="fc-jp" id="fc-jp"></div>
        <div class="fc-romaji" id="fc-romaji"></div>
        <div class="fc-kr" id="fc-kr"></div>
        <div class="fc-ctx" id="fc-ctx"></div>
      </div>
    </div>
    <div class="row2">
      <button class="btn" onclick="prevCard()">← 이전</button>
      <button class="btn primary" onclick="nextCard()">다음 →</button>
    </div>
  </div>

  <!-- ═══════════════ QUIZ ═══════════════ -->
  <div id="view-quiz" class="view">
    <div class="section-hd">
      <button class="back-btn" onclick="showView('home')">← 홈</button>
      <span class="section-title">스파이크 퀴즈</span>
    </div>
    <div class="score-row">
      <div class="score-card"><div class="score-n c" id="qc">0</div><div class="score-lbl">정답</div></div>
      <div class="score-card"><div class="score-n w" id="qw">0</div><div class="score-lbl">오답</div></div>
      <div class="score-card"><div class="score-n" id="qt" style="color:var(--text)">0</div><div class="score-lbl">총</div></div>
    </div>
    <div class="streak" id="streak-msg"></div>
    <div class="quiz-q-box">
      <div class="quiz-char" id="quiz-char">?</div>
      <div class="quiz-sub" id="quiz-sub">이 단어의 뜻은?</div>
    </div>
    <div class="quiz-opts" id="quiz-opts"></div>
    <div class="quiz-fb" id="quiz-fb">
      <div class="fb-char" id="fb-char"></div>
      <div class="fb-detail" id="fb-detail"></div>
    </div>
    <button class="btn primary" id="quiz-next" onclick="nextQuiz()" style="display:none">다음 문제 →</button>
  </div>

  <!-- ═══════════════ SENTENCES ═══════════════ -->
  <div id="view-sentences" class="view">
    <div class="section-hd">
      <button class="back-btn" onclick="showView('home')">← 홈</button>
      <span class="section-title">하이큐 명대사</span>
    </div>
    <!-- char filter -->
    <div class="cat-row" id="sent-char-filter"></div>
    <!-- ep filter -->
    <div class="cat-row" id="sent-cats"></div>
    <div class="progress-bar"><div class="progress-fill" id="sp-fill"></div></div>
    <div class="progress-label" id="sp-label"></div>
    <div id="sent-display"></div>
    <div class="row2">
      <button class="btn" onclick="prevSent()">← 이전</button>
      <button class="btn primary" onclick="nextSent()">다음 →</button>
    </div>
  </div>

  <!-- ═══════════════ CANVAS ═══════════════ -->
  <div id="view-canvas" class="view">
    <div class="section-hd">
      <button class="back-btn" onclick="showView('home')">← 홈</button>
      <span class="section-title">히라가나 / 가타카나 쓰기</span>
    </div>
    <!-- type selector -->
    <div class="canvas-type-row">
      <button class="ctype-btn active" id="ct-hira" onclick="setKanaType('hira')">あ 히라가나</button>
      <button class="ctype-btn" id="ct-kata" onclick="setKanaType('kata')">ア 가타카나</button>
    </div>
    <!-- tab: basic / extended -->
    <div class="tab-row">
      <button class="tab-btn active" id="ktab-basic" onclick="setKanaTab('basic')">청음·탁음</button>
      <button class="tab-btn" id="ktab-ext" onclick="setKanaTab('ext')">요음 (拗音)</button>
    </div>
    <!-- category grid -->
    <div class="canvas-cat-grid" id="kana-cats"></div>
    <!-- char display -->
    <div id="kana-view">
      <div class="progress-bar"><div class="progress-fill" id="kp-fill"></div></div>
      <div class="progress-label" id="kp-label"></div>
      <div class="char-top-row">
        <div class="char-display">
          <div class="char-big" id="kana-char">あ</div>
          <div class="char-info" id="kana-info">a (아)</div>
          <div class="char-strokes" id="kana-strokes"></div>
        </div>
        <div>
          <div class="check-badge unchecked" id="check-badge" onclick="toggleCheck()">✓ 완료</div>
        </div>
      </div>
      <!-- canvas -->
      <div class="canvas-wrap">
        <canvas id="drawCanvas"></canvas>
        <canvas id="guideCanvas"></canvas>
      </div>
      <div class="canvas-btns">
        <button class="btn" onclick="clearCanvas()">🗑 지우기</button>
        <button class="btn" onclick="toggleGuide()">👁 가이드</button>
        <button class="btn" id="prev-kana" onclick="prevKana()">← 이전</button>
      </div>
      <div class="row2">
        <button class="btn" onclick="prevKana()">← 이전</button>
        <button class="btn primary" onclick="nextKana()">다음 →</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const CHARS = ['전체','힌아타','카게야마','츠키시마','니시노야','타나카','사토리','아카아시','케넬마'];

const vocabData = {
  volleyball:[
    {char:'スパイク',jp:'スパイク',romaji:'supaiku',kr:'스파이크 (강공격)',speaker:'힌아타',ctx:'배구에서 강하게 때리는 공격 동작. 힌아타의 주 무기! 영어 spike에서 온 외래어.'},
    {char:'トス',jp:'トス',romaji:'tosu',kr:'토스 (공 올려주기)',speaker:'카게야마',ctx:'세터가 공격수에게 공을 올려주는 동작. 카게야마의 전문 기술.'},
    {char:'ブロック',jp:'ブロック',romaji:'burokku',kr:'블로킹 (막기)',speaker:'츠키시마',ctx:'상대방의 공격을 막는 동작. 츠키시마의 특기이자 각성의 계기.'},
    {char:'レシーブ',jp:'レシーブ',romaji:'resiibu',kr:'리시브 (받기)',speaker:'니시노야',ctx:'상대방의 서브·스파이크를 받아내는 동작. 리베로 니시노야의 전문!'},

function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.ttab').forEach((t,i)=>{
    t.classList.toggle('active',['home','vocab','quiz','sentences','canvas'][i]===v);
  });
  document.getElementById('view-'+v).classList.add('active');
  if(v==='vocab'){initVocab();}
  if(v==='quiz'){initQuiz();}
  if(v==='sentences'){initSentences();}
  if(v==='canvas'){initCanvas();}
}
function gotoView(v){showView(v);}

const vocabCatLabels = {volleyball:'🏐 배구 용어',hinata:'🟠 힌아타',kageyama:'👑 카게야마',tsukishima:'🦕 츠키시마',nishioyatanaka:'🛡 니시노야·타나카',general:'💬 공통 표현'};
const charToVocabCat = {'힌아타':'hinata','카게야마':'kageyama','츠키시마':'tsukishima','니시노야':'nishioyatanaka','타나카':'nishioyatanaka'};

function initVocab(){
  // char filter
  const cf = document.getElementById('char-filter');
  cf.innerHTML='';
  ['전체','힌아타','카게야마','츠키시마','니시노야','타나카'].forEach(ch=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(ch===vocabCharFilter?' active':'');
    b.textContent=ch;
    b.onclick=()=>{vocabCharFilter=ch;vocabIdx=0;
      if(ch!=='전체'){const mapped=charToVocabCat[ch]||'general';vocabCat=mapped;}
      else vocabCat='volleyball';
      cf.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      buildVocabCatBtns();renderCard();};
    cf.appendChild(b);
  });
  buildVocabCatBtns();
  renderCard();
}

function buildVocabCatBtns(){
  const el=document.getElementById('vocab-cats');
  el.innerHTML='';
  // if char filter active, only show relevant cats
  const cats = vocabCharFilter==='전체'
    ? Object.keys(vocabCatLabels)
    : ['volleyball', charToVocabCat[vocabCharFilter]||'general','general'];
  const unique=[...new Set(cats)];
  unique.forEach(cat=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(cat===vocabCat?' active':'');
    b.textContent=vocabCatLabels[cat];
    b.onclick=()=>{vocabCat=cat;vocabIdx=0;
      el.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');renderCard();};
    el.appendChild(b);
  });
}

function getVocabItems(){
  let items = vocabData[vocabCat]||[];
  if(vocabCharFilter!=='전체') items=items.filter(it=>it.speaker===vocabCharFilter||it.speaker==='전체');
  return items.length>0?items:vocabData[vocabCat]||[];
}

function renderCard(){
  fcRevealed=false;
  document.getElementById('fc-bottom').classList.remove('show');
  const items=getVocabItems();
  if(!items.length)return;
  if(vocabIdx>=items.length)vocabIdx=0;
  const it=items[vocabIdx];
  document.getElementById('fc-speaker').textContent='🏐 '+it.speaker;
  document.getElementById('fc-char').textContent=it.char;
  document.getElementById('fc-jp').textContent=it.jp;
  document.getElementById('fc-romaji').textContent='['+it.romaji+']';
  document.getElementById('fc-kr').textContent=it.kr;
  document.getElementById('fc-ctx').textContent=it.ctx;
  const pct=((vocabIdx+1)/items.length)*100;
  document.getElementById('vp-fill').style.width=pct+'%';
  document.getElementById('vp-label').textContent=(vocabIdx+1)+' / '+items.length;
}
function toggleReveal(){fcRevealed=!fcRevealed;document.getElementById('fc-bottom').classList.toggle('show',fcRevealed);}
function nextCard(){const l=getVocabItems().length;vocabIdx=(vocabIdx+1)%l;renderCard();}
function prevCard(){const l=getVocabItems().length;vocabIdx=(vocabIdx-1+l)%l;renderCard();}

/* ══════════════════════════════════════════
   QUIZ
══════════════════════════════════════════ */
function getAllVocab(){return Object.values(vocabData).flat();}
function initQuiz(){
  quizCorrect=0;quizWrong=0;quizStreak=0;
  updQScores();nextQuiz();
}
function updQScores(){
  document.getElementById('qc').textContent=quizCorrect;
  document.getElementById('qw').textContent=quizWrong;
  document.getElementById('qt').textContent=quizCorrect+quizWrong;
}
function nextQuiz(){
  quizAnswered=false;
  document.getElementById('quiz-fb').classList.remove('show');
  document.getElementById('quiz-next').style.display='none';
  const all=getAllVocab().sort(()=>Math.random()-.5);
  quizItem=all[0];
  const wrongs=all.slice(1,4);
  const opts=[...wrongs,quizItem].sort(()=>Math.random()-.5);
  document.getElementById('quiz-char').textContent=quizItem.char;
  document.getElementById('quiz-sub').textContent='이 단어의 뜻은?';
  const el=document.getElementById('quiz-opts');
  el.innerHTML='';
  opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='qopt';b.textContent=opt.kr;
    b.onclick=()=>answerQuiz(opt,b);
    el.appendChild(b);
  });
}
function answerQuiz(chosen,btn){
  if(quizAnswered)return;quizAnswered=true;
  const ok=chosen.char===quizItem.char;
  document.querySelectorAll('.qopt').forEach(b=>b.classList.add('disabled'));
  document.querySelectorAll('.qopt').forEach(b=>{if(b.textContent===quizItem.kr)b.classList.add('correct');});
  if(!ok){btn.classList.add('wrong');quizWrong++;quizStreak=0;document.getElementById('streak-msg').textContent='';}
  else{quizCorrect++;quizStreak++;
    const msgs=['','','🔥 2연속!','⚡ 3연속!','🏐 스파이크 4연속!','👑 5연속 에이스!'];
    document.getElementById('streak-msg').textContent=quizStreak>=2?(msgs[Math.min(quizStreak,5)]||'🏆 '+quizStreak+'연속!'):'';
  }
  updQScores();
  document.getElementById('fb-char').textContent=quizItem.jp+' → '+quizItem.kr;
  document.getElementById('fb-detail').textContent='['+quizItem.romaji+']  '+quizItem.ctx;
  document.getElementById('quiz-fb').classList.add('show');
  document.getElementById('quiz-next').style.display='block';
}

/* ══════════════════════════════════════════
   SENTENCES
══════════════════════════════════════════ */
function initSentences(){
  // char filter
  const cf=document.getElementById('sent-char-filter');
  cf.innerHTML='';
  ['전체','힌아타','카게야마','츠키시마','니시노야','타나카'].forEach(ch=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(ch===sentCharFilter?' active':'');
    b.textContent=ch;
    b.onclick=()=>{sentCharFilter=ch;sentIdx=0;
      cf.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');buildSentCatBtns();renderSent();};
    cf.appendChild(b);
  });
  buildSentCatBtns();
  renderSent();
}

function buildSentCatBtns(){
  const el=document.getElementById('sent-cats');
  el.innerHTML='';
  const eps=['전체','시즌1','시즌2','시즌3','시즌4','경기 중','경기 후'];
  eps.forEach(ep=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(ep===sentCat?' active':'');
    b.textContent=ep==='전체'?'📋 전체':ep;
    b.onclick=()=>{sentCat=ep;sentIdx=0;
      el.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');renderSent();};
    el.appendChild(b);
  });
}

function getFilteredSents(){
  let items=sentenceData;
  if(sentCharFilter!=='전체') items=items.filter(s=>s.char===sentCharFilter||s.char==='전체');
  if(sentCat!=='전체' && sentCat!=='all') items=items.filter(s=>s.ep===sentCat);
  return items.length?items:sentenceData;
}

function renderSent(){
  const items=getFilteredSents();
  if(!items.length){document.getElementById('sent-display').innerHTML='<div class="card" style="text-align:center;color:var(--text3);padding:30px">해당 필터에 맞는 문장이 없어요.</div>';return;}
  if(sentIdx>=items.length)sentIdx=0;
  const it=items[sentIdx];
  const pct=((sentIdx+1)/items.length)*100;
  document.getElementById('sp-fill').style.width=pct+'%';
  document.getElementById('sp-label').textContent=(sentIdx+1)+' / '+items.length;
  const bdHtml=it.bd.map(b=>`<div class="bd-row"><div class="bd-jp">${b.jp}</div><div class="bd-desc">${b.d}</div></div>`).join('');
  const tagsHtml=(it.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('sent-display').innerHTML=`
  <div class="card">
    <div class="sent-scene">${it.scene}</div>
    <div class="sent-ep">${it.ep} · ${it.char}</div>
    <div class="sent-jp">${it.jp}</div>
    <div class="sent-romaji">${it.romaji}</div>
    <div class="sent-pron">${it.pron}</div>
    <div class="sent-kr">${it.kr}</div>
    <div>${tagsHtml}</div>
    <button class="toggle-bd" onclick="toggleBd(this)">문법 분석 보기 ↓</button>
    <div class="breakdown-box" id="bd-box">${bdHtml}</div>
  </div>`;
}
function toggleBd(btn){
  const b=document.getElementById('bd-box');
  const s=b.classList.toggle('show');
  btn.textContent=s?'문법 분석 닫기 ↑':'문법 분석 보기 ↓';
}
function nextSent(){const l=getFilteredSents().length;sentIdx=(sentIdx+1)%l;renderSent();}
function prevSent(){const l=getFilteredSents().length;sentIdx=(sentIdx-1+l)%l;renderSent();}

/* ══════════════════════════════════════════
   CANVAS
══════════════════════════════════════════ */
function getKanaData(){
  return kanaType==='hira'
    ? (kanaTab==='basic'?hiraBasic:hiraExt)
    : (kanaTab==='basic'?kataBasic:kataExt);
}
function getKanaColor(){return kanaType==='kata'?'#185fa5':'#E8601C';}

function setKanaType(t){
  kanaType=t;kanaIdx=0;
  document.getElementById('ct-hira').classList.toggle('active',t==='hira');
  document.getElementById('ct-kata').classList.toggle('active',t==='kata');
  const view=document.getElementById('kana-view');
  view.classList.toggle('kana-kata',t==='kata');
  buildKanaCats();renderKana();
}
function setKanaTab(t){
  kanaTab=t;kanaIdx=0;
  document.getElementById('ktab-basic').classList.toggle('active',t==='basic');
  document.getElementById('ktab-ext').classList.toggle('active',t==='ext');
  const data=getKanaData();
  kanaCat=Object.keys(data)[0];
  buildKanaCats();renderKana();
}

function buildKanaCats(){
  const el=document.getElementById('kana-cats');
  el.innerHTML='';
  const data=getKanaData();
  const labels=kanaTab==='basic'?basicCatLabels:extCatLabels;
  Object.keys(data).forEach(cat=>{
    const items=data[cat];
    const anyDone=items.some(it=>{const k=kanaType+':'+it.c;return kanaChecked[k];});
    const b=document.createElement('button');
    b.className='cc-btn'+(cat===kanaCat?' active':'')+(anyDone?' has-done':'');
    b.innerHTML=(labels[cat]||cat)+'<span class="done-dot"></span>';
    b.onclick=()=>{kanaCat=cat;kanaIdx=0;
      el.querySelectorAll('.cc-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');renderKana();clearCanvas();};
    el.appendChild(b);
  });
}

function renderKana(){
  const data=getKanaData()[kanaCat]||[];
  if(!data.length)return;
  if(kanaIdx>=data.length)kanaIdx=0;
  const it=data[kanaIdx];
  document.getElementById('kana-char').textContent=it.c;
  document.getElementById('kana-char').style.color=getKanaColor();
  document.getElementById('kana-info').textContent=it.r+' ('+it.k+')';
  document.getElementById('kana-strokes').textContent=it.s||'';
  const pct=((kanaIdx+1)/data.length)*100;
  document.getElementById('kp-fill').style.width=pct+'%';
  document.getElementById('kp-fill').style.background=getKanaColor();
  document.getElementById('kp-label').textContent=(kanaIdx+1)+' / '+data.length;
  const key=kanaType+':'+it.c;
  const done=!!kanaChecked[key];
  const badge=document.getElementById('check-badge');
  badge.textContent=done?'✓ 완료':'✓ 완료';
  badge.className='check-badge'+(done?'':' unchecked');
  drawGuide();
}

function toggleCheck(){
  const data=getKanaData()[kanaCat]||[];
  const it=data[kanaIdx];if(!it)return;
  const key=kanaType+':'+it.c;
  kanaChecked[key]=!kanaChecked[key];
  try{localStorage.setItem('kanaChecked',JSON.stringify(kanaChecked));}catch(e){}
  renderKana();buildKanaCats();
}

function initCanvas(){
  drawCanvas=document.getElementById('drawCanvas');
  guideCanvasEl=document.getElementById('guideCanvas');
  drawCtx=drawCanvas.getContext('2d');
  guideCtx=guideCanvasEl.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);

  drawCanvas.addEventListener('mousedown',startDraw);
  drawCanvas.addEventListener('mousemove',doDraw);
  drawCanvas.addEventListener('mouseup',stopDraw);
  drawCanvas.addEventListener('mouseleave',stopDraw);
  drawCanvas.addEventListener('touchstart',startDraw,{passive:false});
  drawCanvas.addEventListener('touchmove',doDraw,{passive:false});
  drawCanvas.addEventListener('touchend',stopDraw);

  const data=getKanaData();
  kanaCat=Object.keys(data)[0];
  kanaIdx=0;
  buildKanaCats();
  renderKana();
}

function resizeCanvas(){
  if(!drawCanvas)return;
  const wrap=drawCanvas.parentElement;
  const w=wrap.getBoundingClientRect().width;
  drawCanvas.width=w;drawCanvas.height=220;
  guideCanvasEl.width=w;guideCanvasEl.height=220;
  drawCtx.lineWidth=3;drawCtx.lineCap='round';drawCtx.lineJoin='round';
  drawCtx.strokeStyle='#E8601C';
  drawGuide();
}

function getPos(e){
  const rect=drawCanvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{x:t.clientX-rect.left,y:t.clientY-rect.top};
}
function startDraw(e){e.preventDefault();isDrawing=true;const p=getPos(e);drawCtx.beginPath();drawCtx.moveTo(p.x,p.y);}
function doDraw(e){if(!isDrawing)return;e.preventDefault();const p=getPos(e);drawCtx.lineTo(p.x,p.y);drawCtx.stroke();}
function stopDraw(){isDrawing=false;}
function clearCanvas(){if(drawCtx)drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);}
function toggleGuide(){
  guideVisible=!guideVisible;
  guideCanvasEl.classList.toggle('show',guideVisible);
}
function drawGuide(){
  if(!guideCtx)return;
  guideCtx.clearRect(0,0,guideCanvasEl.width,guideCanvasEl.height);
  const data=getKanaData()[kanaCat]||[];
  const it=data[kanaIdx];if(!it)return;
  const size=Math.min(guideCanvasEl.width,guideCanvasEl.height)*0.65;
  guideCtx.font='bold '+size+'px sans-serif';
  guideCtx.fillStyle=getKanaColor();
  guideCtx.textAlign='center';
  guideCtx.textBaseline='middle';
  guideCtx.fillText(it.c,guideCanvasEl.width/2,guideCanvasEl.height/2);
}
function nextKana(){const l=(getKanaData()[kanaCat]||[]).length;kanaIdx=(kanaIdx+1)%l;renderKana();clearCanvas();}
function prevKana(){const l=(getKanaData()[kanaCat]||[]).length;kanaIdx=(kanaIdx-1+l)%l;renderKana();clearCanvas();}

/* ── BOOT ── */
initVocab();
</script>
